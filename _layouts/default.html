<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ page.title | default: "shugg.dev" }}</title>
    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.15.4/css/all.css">
    <link rel="stylesheet" href="{{ '/css/base.css' | relative_url }}">
    {% assign theme = page.theme | default: "retro" %}
    <link rel="stylesheet" href="{{ '/css/themes/' | append: theme | append: '.css' | relative_url }}">
    {% if page.extra_css %}
    {% for css_file in page.extra_css %}
    <link rel="stylesheet" href="{{ css_file | relative_url }}">
    {% endfor %}
    {% endif %}
    <link rel="icon" href="{{ '/favicon.ico' | relative_url }}">
</head>
<body class="{{ theme }}-theme">
    <header class="site-header">
        <a href="{{ '/' | relative_url }}" class="site-title">shugg.dev</a>
        <button class="sidebar-toggle" id="sidebarToggle" aria-label="Open menu">
            <i class="fas fa-bars"></i>
        </button>
        <nav>
            <a href="{{ '/' | relative_url }}" class="button-nav">Home</a>
            <a href="{{ '/tools' | relative_url }}" class="button-nav">Tools</a>
            <button class="theme-toggle" id="themeToggle" title="Toggle light/dark mode"><i class="fas fa-sun"></i></button>
        </nav>
    </header>

    <!-- Mobile sidebar overlay -->
    <div class="sidebar-overlay" id="sidebarOverlay"></div>
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <span class="site-title">shugg.dev</span>
            <button class="sidebar-close" id="sidebarClose" aria-label="Close menu">
                <i class="fas fa-times"></i>
            </button>
        </div>
        <nav class="sidebar-nav">
            <a href="{{ '/' | relative_url }}" class="button-nav">Home</a>
            <a href="{{ '/tools' | relative_url }}" class="button-nav">Tools</a>
            <button class="theme-toggle" id="themeToggleSidebar" title="Toggle light/dark mode"><i class="fas fa-sun"></i></button>
        </nav>
    </aside>

    <main>
        {{ content }}
    </main>
    <footer class="site-footer">
        <div>
            <a href="https://github.com/cwshugg" title="GitHub">
                <i class="fab fa-github"></i>
            </a>
            <a href="https://www.linkedin.com/in/connor-shugg/" title="LinkedIn">
                <i class="fab fa-linkedin"></i>
            </a>
            <a href="mailto:connor@shugg.dev" title="Email">
                <i class="fas fa-envelope"></i>
            </a>
        </div>
        <p>&copy; Connor Shugg</p>
    </footer>
    {% if page.extra_js %}
    {% for js_file in page.extra_js %}
    <script src="{{ js_file | relative_url }}"></script>
    {% endfor %}
    {% endif %}
    <script src="{{ '/script/theme.js' | relative_url }}"></script>
    <script src="{{ '/script/sidebar.js' | relative_url }}"></script>
</body>
</html>
